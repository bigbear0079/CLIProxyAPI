name: Deploy on Self-Hosted Runner

on:
  workflow_run:
    workflows: ["Docker Image CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: true

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == github.event.workflow_run.repository.default_branch
      )
    runs-on: [self-hosted, linux, x64, deploy-server]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy via docker compose
        env:
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
          COMPOSE_FILE: ${{ vars.COMPOSE_FILE || 'docker-compose.yml' }}
          HEALTH_URL: ${{ vars.HEALTH_URL }}
        run: |
          bash scripts/deploy_with_compose.sh
